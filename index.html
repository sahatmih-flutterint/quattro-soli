<!DOCTYPE html>
<html lang="bg">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Меню</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
background:#111;
color:white;

}

header{

position:sticky;
top:0;

padding:20px;

background:rgba(17,17,17,.95);

backdrop-filter:blur(15px);

text-align:center;

font-size:30px;

font-weight:700;

letter-spacing:1px;

border-bottom:1px solid rgba(255,255,255,.08);

z-index:100;

}

.sub{

text-align:center;

color:#999;

padding:12px 20px 25px;

font-size:15px;

}

.container{

max-width:900px;

margin:auto;

padding:15px;

}

.card{

overflow:hidden;

border-radius:24px;

margin-bottom:30px;

background:#1a1a1a;

box-shadow:
0 15px 40px rgba(0,0,0,.45);

transition:.35s;

}

.card:hover{

transform:translateY(-4px);

}

.card img{

width:100%;

display:block;

cursor:pointer;

}

.lightbox{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.95);

display:none;

justify-content:center;
align-items:center;

padding:20px;

z-index:999;

}

.lightbox img{

max-width:100%;
max-height:100%;

border-radius:16px;

box-shadow:0 15px 40px rgba(0,0,0,.5);

}

.show{

display:flex;

animation:fade .25s;

}

@keyframes fade{

from{
opacity:0;
}

to{
opacity:1;
}

}

.top{

position:fixed;

bottom:20px;

right:20px;

width:55px;

height:55px;

border-radius:50%;

background:#ff7a00;

display:flex;

justify-content:center;
align-items:center;

font-size:22px;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.45);

user-select:none;

}

footer{

text-align:center;

padding:35px;

color:#777;

font-size:14px;

}

</style>

</head>

<body>

<header>
🍕 Меню
</header>

<div class="sub">
Добре дошли! ❤️
</div>

<div class="container">

<div class="card">
<img src="menu1.jpg" onclick="show(this.src)">
</div>

<div class="card">
<img src="menu2.jpg" onclick="show(this.src)">
</div>

<div class="card">
<img src="menu3.jpg" onclick="show(this.src)">
</div>

<div class="card">
<img src="menu4.jpg" onclick="show(this.src)">
</div>

<div class="card">
<img src="menu5.jpg" onclick="show(this.src)">
</div>

<div class="card">
<img src="menu6.jpg" onclick="show(this.src)">
</div>

</div>

<footer>

Желаем Ви приятен апетит!

</footer>

<div class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">

↑

</div>

<div class="lightbox" id="lightbox" onclick="hideImage()">

<img id="preview">

</div>

<script>

function show(src){

document.getElementById("preview").src=src;

document.getElementById("lightbox").classList.add("show");

}

function hideImage(){

document.getElementById("lightbox").classList.remove("show");

}

</script>

</body>
</html>
